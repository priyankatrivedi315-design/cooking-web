<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food World • Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
:root {
    --primary: #e67e22;
    --primary-dark: #d35400;
    --accent: #f39c12;
    --bg: #fffaf4;
    --card-bg: #ffffff;
    --text: #1a1208;
    --muted: #8b7355;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: DM Sans;
    background: var(--bg);
    color: var(--text);
}

header {
    position: sticky;
    top: 0;
    background: rgba(255,250,244,0.92);
    padding: 16px 36px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #f0e4cc;
}

.logo {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
}

.home-btn {
    padding: 10px 20px;
    border-radius: 30px;
    border: none;
    background: var(--primary);
    color: white;
    cursor: pointer;
}

#app {
    max-width: 1200px;
    margin:auto;
    padding:40px 20px;
}

.page-title {
    text-align:center;
    font-size: 40px;
    margin-bottom: 20px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.card {
    background:white;
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content {
    padding:15px;
}

.back-btn {
    margin-bottom:20px;
    padding:10px 20px;
    border-radius:20px;
    border:1px solid #ddd;
    cursor:pointer;
    background:white;
}

.item {
    display:flex;
    align-items:center;
    background:white;
    margin:10px 0;
    border-radius:12px;
    overflow:hidden;
}

.item img {
    width:80px;
    height:80px;
    object-fit:cover;
}

.item-body {
    padding:10px;
    flex:1;
}
</style>
</head>

<body>

    <div class="logo">🍽 Food World</div>
    <button class="home-btn" onclick="loadMain()">Home</button>
</header>

<div id="app"></div>

const FALLBACK = "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400";

function img(key, map) {
    return map[key] || FALLBACK;
}

/* MAIN */
function loadMain(){
    app.innerHTML = `
        <div class="page-title">What are you craving?</div>
        <div class="grid"></div>
    `;

    let grid = app.querySelector(".grid");

    for(let key in data){
        let d = data[key];

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${img(key, mainImages)}">
            <div class="card-content">
                <h3>${d.label}</h3>
            </div>
        `;

        card.onclick = () => loadSubs(key);
        grid.appendChild(card);
    }
}

/* SUBS */
function loadSubs(key){
    currentMain = key;
    let obj = data[key];

    app.innerHTML = `
        <button class="back-btn" onclick="loadMain()">← Back</button>
        <div class="page-title">${obj.label}</div>
        <div class="grid"></div>
    `;

    let grid = app.querySelector(".grid");
    let children = obj.subs || obj.cuisines || {};

    for(let k in children){
        let s = children[k];

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${img(k, subImages)}">
            <div class="card-content">
                <h3>${s.label}</h3>
            </div>
        `;

        card.onclick = () => {
            if(s.items){
                loadItems(s);
            } else {
                loadSubsChild(s, k);
            }
        };

        grid.appendChild(card);
    }
}

/* SUB CHILD */
function loadSubsChild(obj, parentKey){

    app.innerHTML = `
        <button class="back-btn" onclick="loadSubs(currentMain)">← Back</button>
        <div class="page-title">${obj.label}</div>
        <div class="grid"></div>
    `;

    let grid = app.querySelector(".grid");
    let children = obj.subs || obj.cuisines || {};

    for(let k in children){
        let s = children[k];

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${img(k, subImages)}">
            <div class="card-content">
                <h3>${s.label}</h3>
            </div>
        `;

        card.onclick = () => loadItems(s);
        grid.appendChild(card);
    }
}

/* ITEMS */
function loadItems(obj){

    app.innerHTML = `
        <button class="back-btn" onclick="loadSubs(currentMain)">← Back</button>
        <div class="page-title">${obj.label}</div>
        <div></div>
    `;

    let box = app.querySelector("div:last-child");

    obj.items.forEach(item => {
        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <img src="${img(item, itemImages)}">
            <div class="item-body">
                <h4>${item}</h4>
            </div>
        `;

        box.appendChild(div);
    });
}

loadMain();

</script>

</html>
